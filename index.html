<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>ZOVchat — Приватные чаты</title>
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Roboto', 'Oxygen', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0a1f14 0%, #0c2a1a 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
        }

        /* главный контейнер */
        .private-chat-app {
            max-width: 1400px;
            width: 100%;
            height: 90vh;
            background: #1e2a24;
            border-radius: 32px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            display: flex;
            overflow: hidden;
            border: 1px solid #d4af37;
        }

        /* боковая панель с диалогами */
        .dialogs-sidebar {
            width: 320px;
            background: #16231c;
            border-right: 2px solid #2f4a38;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }

        .sidebar-header {
            padding: 20px 16px;
            background: #0f2a1c;
            border-bottom: 2px solid #d4af37;
        }

        .sidebar-header h2 {
            color: #ffde9c;
            font-size: 1.4rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .user-info {
            padding: 12px 16px;
            background: #1a3327;
            margin: 8px 12px;
            border-radius: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .user-name-side {
            color: #f5e7a3;
            font-weight: bold;
            font-size: 0.9rem;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .logout-side {
            background: none;
            border: 1px solid #b8860b;
            color: #ffd966;
            padding: 4px 12px;
            border-radius: 40px;
            cursor: pointer;
            font-size: 0.7rem;
        }

        .new-chat-btn {
            margin: 16px;
            background: #d4af37;
            border: none;
            padding: 10px;
            border-radius: 40px;
            font-weight: bold;
            color: #1a3a2a;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .dialogs-list {
            flex: 1;
            padding: 8px;
        }

        .dialog-item {
            background: #25382e;
            margin-bottom: 8px;
            padding: 12px;
            border-radius: 20px;
            cursor: pointer;
            transition: 0.2s;
            border-left: 4px solid transparent;
        }

        .dialog-item.active {
            background: #2f5e42;
            border-left-color: #f3c26b;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
        }

        .dialog-name {
            font-weight: bold;
            color: #ffefb9;
            font-size: 1rem;
        }

        .dialog-preview {
            font-size: 0.75rem;
            color: #baccb0;
            margin-top: 5px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* область активного чата */
        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #1b2b23;
        }

        .chat-header-area {
            padding: 18px 24px;
            background: #12281d;
            border-bottom: 1px solid #d4af37;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .chat-with-name {
            font-size: 1.4rem;
            font-weight: bold;
            color: #ffdd99;
        }

        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            background: #202f26;
        }

        .message-bubble {
            max-width: 75%;
            padding: 10px 16px;
            border-radius: 22px;
            background: #2e4438;
            align-self: flex-start;
            border-bottom-left-radius: 4px;
        }

        .message-bubble.my-message {
            align-self: flex-end;
            background: #1f6e46;
            border-bottom-right-radius: 4px;
        }

        .msg-sender {
            font-size: 0.7rem;
            color: #ffd966;
            margin-bottom: 4px;
        }

        .msg-text {
            color: #f0f3e8;
            word-wrap: break-word;
        }

        .msg-time {
            font-size: 0.6rem;
            color: #9bbf8f;
            text-align: right;
            margin-top: 5px;
        }

        .input-wrapper {
            padding: 16px 20px;
            background: #10261c;
            display: flex;
            gap: 12px;
            border-top: 1px solid #3f604a;
        }

        #privateMessageInput {
            flex: 1;
            background: #2f4438;
            border: none;
            padding: 12px 20px;
            border-radius: 40px;
            color: white;
            outline: none;
        }

        .send-private-btn {
            background: #d4af37;
            border: none;
            width: 48px;
            border-radius: 48px;
            font-weight: bold;
            cursor: pointer;
            font-size: 1.3rem;
        }

        .empty-chat {
            text-align: center;
            color: #9bbf8f;
            margin-top: 40px;
        }

        /* модалка нового чата */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
        }

        .modal-card {
            background: #1e3528;
            border-radius: 32px;
            padding: 28px;
            width: 90%;
            max-width: 400px;
            border: 1px solid #f3c26b;
        }

        .modal-card input {
            width: 100%;
            padding: 12px;
            margin: 15px 0;
            background: #2f4438;
            border: none;
            border-radius: 60px;
            color: white;
        }

        .modal-buttons {
            display: flex;
            gap: 12px;
            margin-top: 15px;
        }

        .modal-buttons button {
            flex: 1;
            padding: 10px;
            border-radius: 40px;
            border: none;
            cursor: pointer;
        }

        footer {
            font-size: 0.65rem;
            text-align: center;
            background: #0b1f16;
            color: #6a8f78;
            padding: 6px;
        }

        @media (max-width: 700px) {
            .dialogs-sidebar { width: 260px; }
            .message-bubble { max-width: 85%; }
        }
    </style>
</head>
<body>
<div id="appRoot"></div>

<script>
    // -------------------  КОНФИГ FIREBASE (ЗАМЕНИТЕ НА ВАШ) -------------------
    // 🔥 ВАЖНО: Для работы приватных чатов необходимо создать проект Firebase,
    // включить Authentication (Email/Password) и Firestore.
    // Ниже пример структуры — замените поля на свои из консоли Firebase.
   const firebaseConfig = {
  apiKey: "AIzaSyBMO33F2WExKEEleIeDTV2TyYMizC9ssZY",
  authDomain: "zovchat-f1c83.firebaseapp.com",
  projectId: "zovchat-f1c83",
  storageBucket: "zovchat-f1c83.firebasestorage.app",
  messagingSenderId: "356416079878",
  appId: "1:356416079878:web:14a65405c2fd911bbb5b87"
};
    // ⚠️ Внимание! Без реальных данных Firebase приложение не сможет обмениваться сообщениями.
    // Чтобы всё работало, создайте проект, добавьте веб-приложение, скопируйте конфиг сюда.
    
    // Инициализация Firebase
    let app, db, auth;
    try {
        if (!firebase.apps.length) {
            app = firebase.initializeApp(firebaseConfig);
        } else {
            app = firebase.app();
        }
        db = firebase.firestore(app);
        auth = firebase.auth(app);
        // Настройка persistence
        db.enablePersistence({ synchronizeTabs: true }).catch(e => console.warn(e));
    } catch(e) { console.error(e); }
    
    // Глобальные переменные приложения
    let currentUser = null;               // firebase user
    let activeDialogUserId = null;        // ID собеседника в текущем открытом чате
    let dialogsList = [];                 // массив объектов { userId, userName, lastMessage, lastTimestamp }
    let unsubscribeActiveChat = null;     // отписка от сообщений активного чата
    let dialogsUnsubscribe = null;        // слушатель изменений диалогов
    
    // DOM-контейнер
    const root = document.getElementById('appRoot');
    
    // Вспомогательные функции
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
    
    // Получение ID чата (канонический: лексикографический порядок uid1_uid2)
    function getChatId(uid1, uid2) {
        return uid1 < uid2 ? `${uid1}_${uid2}` : `${uid2}_${uid1}`;
    }
    
    // Загрузка/подписка на список диалогов пользователя (приватные чаты)
    function subscribeToDialogs(userId) {
        if (dialogsUnsubscribe) dialogsUnsubscribe();
        // Ищем все документы в коллекции "private_chats", где participants содержит userId
        const q = db.collection("private_chats").where("participants", "array-contains", userId);
        dialogsUnsubscribe = q.onSnapshot(async (snapshot) => {
            const dialogs = [];
            for (const docSnap of snapshot.docs) {
                const data = docSnap.data();
                const participants = data.participants || [];
                const otherId = participants.find(id => id !== userId);
                if (!otherId) continue;
                // Получаем имя собеседника из users_meta или из participantsNames
                let otherName = data.participantsNames ? data.participantsNames[otherId] : "Товарищ";
                if (!otherName || otherName === "Товарищ") {
                    // попробуем подгрузить из отдельной коллекции
                    const userDoc = await db.collection("users_meta").doc(otherId).get();
                    if (userDoc.exists) otherName = userDoc.data().displayName || "Боец";
                    else otherName = "Воин ZOV";
                }
                const lastMsg = data.lastMessage || "Нет сообщений";
                const lastTs = data.lastTimestamp ? data.lastTimestamp.toDate() : new Date(0);
                dialogs.push({
                    userId: otherId,
                    userName: otherName,
                    lastMessage: lastMsg,
                    lastTimestamp: lastTs,
                    chatDocId: docSnap.id
                });
            }
            dialogs.sort((a,b) => b.lastTimestamp - a.lastTimestamp);
            dialogsList = dialogs;
            renderMainApp(); // перерисовываем боковую панель и активный чат если надо
            // если активный диалог есть, но его нет в списке - сбросим
            if (activeDialogUserId && !dialogsList.some(d => d.userId === activeDialogUserId)) {
                activeDialogUserId = null;
                if (unsubscribeActiveChat) unsubscribeActiveChat();
                renderMainApp();
            }
        }, err => console.warn("dialogs listen error", err));
    }
    
    // Отправка приватного сообщения
    async function sendPrivateMessage(receiverId, text) {
        if (!currentUser || !text.trim() || !receiverId) return;
        const chatId = getChatId(currentUser.uid, receiverId);
        const messageObj = {
            fromId: currentUser.uid,
            fromName: currentUser.displayName || currentUser.email?.split('@')[0] || "ZOV Soldier",
            toId: receiverId,
            text: text.trim(),
            timestamp: firebase.firestore.FieldValue.serverTimestamp(),
        };
        try {
            // Добавляем сообщение в подколлекцию messages чата
            const chatRef = db.collection("private_chats").doc(chatId);
            await chatRef.set({
                participants: [currentUser.uid, receiverId],
                participantsNames: {
                    [currentUser.uid]: currentUser.displayName || "Боец",
                    [receiverId]: "загрузка..."
                },
                lastMessage: text.trim(),
                lastTimestamp: firebase.firestore.FieldValue.serverTimestamp()
            }, { merge: true });
            // Сохраняем имя собеседника в метаданных чата
            if (receiverId) {
                const receiverSnap = await db.collection("users_meta").doc(receiverId).get();
                if (receiverSnap.exists && receiverSnap.data().displayName) {
                    await chatRef.update({
                        [`participantsNames.${receiverId}`]: receiverSnap.data().displayName
                    });
                }
            }
            await chatRef.collection("messages").add(messageObj);
            // Обновим lastMessage и время
            await chatRef.update({
                lastMessage: text.trim(),
                lastTimestamp: firebase.firestore.FieldValue.serverTimestamp()
            });
        } catch(e) { console.error("send error", e); alert("Не удалось отправить, проверьте правила Firestore"); }
    }
    
    // Подписка на сообщения в активном чате
    function subscribeToChatMessages(otherUserId) {
        if (unsubscribeActiveChat) unsubscribeActiveChat();
        if (!currentUser || !otherUserId) return;
        const chatId = getChatId(currentUser.uid, otherUserId);
        const messagesRef = db.collection("private_chats").doc(chatId).collection("messages");
        const q = messagesRef.orderBy("timestamp", "asc").limit(100);
        unsubscribeActiveChat = q.onSnapshot(snapshot => {
            const messagesDiv = document.getElementById("activeMessagesArea");
            if (!messagesDiv) return;
            if (snapshot.empty) {
                messagesDiv.innerHTML = `<div class="empty-chat">💬 Напишите первое сообщение товарищу</div>`;
                return;
            }
            let html = '';
            snapshot.forEach(doc => {
                const msg = doc.data();
                const isMine = msg.fromId === currentUser.uid;
                const senderName = isMine ? "Я" : (msg.fromName || "Собеседник");
                let timeStr = '';
                if (msg.timestamp) {
                    const date = msg.timestamp.toDate();
                    timeStr = `${date.getHours().toString().padStart(2,'0')}:${date.getMinutes().toString().padStart(2,'0')}`;
                }
                html += `
                    <div class="message-bubble ${isMine ? 'my-message' : ''}">
                        <div class="msg-sender">${escapeHtml(senderName)}</div>
                        <div class="msg-text">${escapeHtml(msg.text)}</div>
                        <div class="msg-time">${timeStr}</div>
                    </div>
                `;
            });
            messagesDiv.innerHTML = html;
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }, err => console.warn("chat messages error", err));
    }
    
    // Создание нового чата (по email или имени)
    async function startNewChatWithUser(targetEmailOrName) {
        if (!currentUser) return;
        const searchTerm = targetEmailOrName.trim().toLowerCase();
        if (!searchTerm) return;
        // Поиск пользователей в коллекции users_meta (должна заполняться при регистрации)
        try {
            const usersQuery = await db.collection("users_meta").where("searchIndex", "array-contains", searchTerm).limit(5).get();
            let foundUser = null;
            usersQuery.forEach(doc => {
                if (doc.id !== currentUser.uid) foundUser = { id: doc.id, ...doc.data() };
            });
            if (!foundUser) {
                // дополнительный поиск по email точному
                const emailQuery = await db.collection("users_meta").where("email", "==", targetEmailOrName).get();
                emailQuery.forEach(doc => {
                    if (doc.id !== currentUser.uid) foundUser = { id: doc.id, ...doc.data() };
                });
            }
            if (!foundUser) {
                alert("Пользователь не найден. Убедитесь, что он зарегистрирован в ZOVchat.");
                return;
            }
            const otherId = foundUser.id;
            const otherName = foundUser.displayName || "Товарищ";
            // проверяем существует ли уже диалог
            const chatId = getChatId(currentUser.uid, otherId);
            const chatDoc = await db.collection("private_chats").doc(chatId).get();
            if (!chatDoc.exists) {
                await db.collection("private_chats").doc(chatId).set({
                    participants: [currentUser.uid, otherId],
                    participantsNames: {
                        [currentUser.uid]: currentUser.displayName || "Боец",
                        [otherId]: otherName
                    },
                    lastMessage: "Чат создан",
                    lastTimestamp: firebase.firestore.FieldValue.serverTimestamp()
                });
            }
            activeDialogUserId = otherId;
            subscribeToChatMessages(otherId);
            renderMainApp();
        } catch(e) {
            console.error(e);
            alert("Ошибка поиска. Возможно, правила безопасности Firestore не разрешают чтение users_meta.");
        }
    }
    
    // Рендер главного интерфейса (диалоги + активный чат)
    function renderMainApp() {
        if (!currentUser) return;
        const userName = currentUser.displayName || currentUser.email?.split('@')[0] || "Воин";
        // Генерируем список диалогов
        let dialogsHtml = `<div class="sidebar-header"><h2>📡 ZOVchat</h2><div style="font-size:0.75rem; color:#bdaa6e;">Приватные чаты</div></div>`;
        dialogsHtml += `<div class="user-info"><span class="user-name-side">🔰 ${escapeHtml(userName)}</span><button id="globalLogoutBtn" class="logout-side">Выйти</button></div>`;
        dialogsHtml += `<button id="newChatBtn" class="new-chat-btn">➕ Новый диалог</button>`;
        dialogsHtml += `<div class="dialogs-list">`;
        if (dialogsList.length === 0) {
            dialogsHtml += `<div style="color:#b0b79a; text-align:center; padding:20px;">Нет диалогов. Начни новый!</div>`;
        } else {
            dialogsList.forEach(dialog => {
                const activeClass = (activeDialogUserId === dialog.userId) ? 'active' : '';
                const preview = dialog.lastMessage.length > 35 ? dialog.lastMessage.slice(0,32)+'...' : dialog.lastMessage;
                dialogsHtml += `
                    <div class="dialog-item ${activeClass}" data-otherid="${dialog.userId}">
                        <div class="dialog-name">⚡ ${escapeHtml(dialog.userName)}</div>
                        <div class="dialog-preview">${escapeHtml(preview)}</div>
                    </div>
                `;
            });
        }
        dialogsHtml += `</div><footer style="padding:12px;">Своих не бросаем — приватно и надёжно</footer>`;
        
        // Область активного чата
        let chatAreaHtml = `<div class="chat-header-area"><div class="chat-with-name">`;
        if (activeDialogUserId) {
            const activeDialog = dialogsList.find(d => d.userId === activeDialogUserId);
            const displayNameActive = activeDialog ? activeDialog.userName : "Собеседник";
            chatAreaHtml += `💬 Чат с ${escapeHtml(displayNameActive)}`;
        } else {
            chatAreaHtml += `📭 Выберите диалог или создайте новый`;
        }
        chatAreaHtml += `</div></div><div id="messagesContainerScroll" class="messages-container"><div id="activeMessagesArea" class="messages-container" style="overflow-y:auto; display:flex; flex-direction:column; gap:12px;">`;
        if (!activeDialogUserId) chatAreaHtml += `<div class="empty-chat">✨ Нажмите на диалог или создайте новый чат ✨</div>`;
        chatAreaHtml += `</div></div><div class="input-wrapper"><input type="text" id="privateMessageInput" placeholder="Сообщение..." autocomplete="off"><button id="sendPrivateMsgBtn" class="send-private-btn">➤</button></div>`;
        
        const fullHtml = `<div class="private-chat-app"><div class="dialogs-sidebar">${dialogsHtml}</div><div class="chat-area">${chatAreaHtml}</div></div>`;
        root.innerHTML = fullHtml;
        
        // Привязываем обработчики
        document.querySelectorAll('.dialog-item').forEach(el => {
            el.addEventListener('click', (e) => {
                const otherId = el.getAttribute('data-otherid');
                if (otherId && otherId !== activeDialogUserId) {
                    activeDialogUserId = otherId;
                    subscribeToChatMessages(otherId);
                    renderMainApp(); // обновляем активный чат
                }
            });
        });
        const logoutBtn = document.getElementById('globalLogoutBtn');
        if (logoutBtn) logoutBtn.onclick = () => auth.signOut();
        const newChatBtn = document.getElementById('newChatBtn');
        if (newChatBtn) newChatBtn.onclick = () => showNewChatModal();
        const sendBtn = document.getElementById('sendPrivateMsgBtn');
        const msgInput = document.getElementById('privateMessageInput');
        if (sendBtn && msgInput && activeDialogUserId) {
            sendBtn.onclick = async () => {
                const text = msgInput.value.trim();
                if (text && activeDialogUserId) {
                    await sendPrivateMessage(activeDialogUserId, text);
                    msgInput.value = '';
                }
            };
            msgInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter' && activeDialogUserId) {
                    sendBtn.click();
                }
            });
        }
    }
    
    // Модалка создания нового чата
    function showNewChatModal() {
        const modalDiv = document.createElement('div');
        modalDiv.className = 'modal';
        modalDiv.innerHTML = `
            <div class="modal-card">
                <h3 style="color:#ffde9c;">🔍 Найти товарища</h3>
                <input type="text" id="searchUserInput" placeholder="Email или позывной собеседника">
                <div class="modal-buttons">
                    <button id="modalConfirmBtn">Начать чат</button>
                    <button id="modalCancelBtn">Отмена</button>
                </div>
            </div>
        `;
        document.body.appendChild(modalDiv);
        const searchInput = document.getElementById('searchUserInput');
        const confirmBtn = document.getElementById('modalConfirmBtn');
        const cancelBtn = document.getElementById('modalCancelBtn');
        confirmBtn.onclick = async () => {
            const query = searchInput.value;
            if (query) {
                await startNewChatWithUser(query);
                modalDiv.remove();
            } else alert("Введите данные");
        };
        cancelBtn.onclick = () => modalDiv.remove();
    }
    
    // Логин / Регистрация
    function renderLoginScreen(errorMsg = "") {
        root.innerHTML = `
            <div class="modal" style="background:rgba(0,0,0,0.95);">
                <div class="modal-card">
                    <h2 style="color:#ffde9c;">⚔️ ZOVchat ⚔️</h2>
                    <p>Приватные чаты для своих</p>
                    <input type="text" id="regNickname" placeholder="Позывной (отображается в чатах)" style="margin-top:20px;">
                    <input type="email" id="regEmail" placeholder="Email (для входа)">
                    <input type="password" id="regPassword" placeholder="Пароль (мин 6 символов)">
                    <button id="authActionBtn" class="new-chat-btn" style="width:100%; margin:16px 0 0 0;">ВОЙТИ / РЕГИСТРАЦИЯ</button>
                    <div id="loginErrorMessage" style="color:#ffa76e; font-size:0.8rem; margin-top:10px;">${escapeHtml(errorMsg)}</div>
                    <div class="guest-note" style="margin-top:16px;">⭐ Если аккаунта нет — создастся автоматически</div>
                </div>
            </div>
        `;
        const authBtn = document.getElementById('authActionBtn');
        const nicknameInp = document.getElementById('regNickname');
        const emailInp = document.getElementById('regEmail');
        const passInp = document.getElementById('regPassword');
        const errorSpan = document.getElementById('loginErrorMessage');
        
        authBtn.onclick = async () => {
            const nickname = nicknameInp.value.trim() || "ВоинZOV";
            const email = emailInp.value.trim();
            const password = passInp.value.trim();
            if (!email || !password) { errorSpan.innerText = "Заполните email и пароль (>=6 символов)"; return; }
            if (password.length < 6) { errorSpan.innerText = "Пароль минимум 6 символов"; return; }
            try {
                let userCred;
                try {
                    userCred = await auth.signInWithEmailAndPassword(email, password);
                } catch (err) {
                    if (err.code === 'auth/user-not-found') {
                        userCred = await auth.createUserWithEmailAndPassword(email, password);
                    } else throw err;
                }
                const user = userCred.user;
                await user.updateProfile({ displayName: nickname });
                await user.reload();
                // Сохраняем метаданные пользователя для поиска
                await db.collection("users_meta").doc(user.uid).set({
                    displayName: nickname,
                    email: email,
                    searchIndex: [nickname.toLowerCase(), email.toLowerCase().split('@')[0]],
                    uid: user.uid
                }, { merge: true });
                currentUser = auth.currentUser;
                subscribeToDialogs(currentUser.uid);
            } catch(err) {
                errorSpan.innerText = "Ошибка: " + err.message;
            }
        };
    }
    
    // Основной слушатель аутентификации
    auth.onAuthStateChanged(async (user) => {
        if (user) {
            currentUser = user;
            if (!user.displayName) {
                let name = user.email?.split('@')[0] || "Боец";
                await user.updateProfile({ displayName: name });
                await db.collection("users_meta").doc(user.uid).set({
                    displayName: name,
                    email: user.email,
                    searchIndex: [name.toLowerCase(), user.email.toLowerCase().split('@')[0]],
                }, { merge: true });
            }
            subscribeToDialogs(user.uid);
            if (activeDialogUserId) subscribeToChatMessages(activeDialogUserId);
        } else {
            if (unsubscribeActiveChat) unsubscribeActiveChat();
            if (dialogsUnsubscribe) dialogsUnsubscribe();
            currentUser = null;
            activeDialogUserId = null;
            renderLoginScreen("");
        }
    });
    
    if (!auth) {
        root.innerHTML = `<div class="modal"><div class="modal-card"><h2>⚠️ Ошибка Firebase</h2><p>Проверьте конфигурацию в коде (apiKey и др.). Замените на данные из консоли Firebase.</p></div></div>`;
    }
</script>
</body>
</html>
