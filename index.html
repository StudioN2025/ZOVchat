<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>ZOVchat — Мессенджер для своих</title>
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Roboto', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #1a472a 0%, #0e2a1a 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
        }

        /* Главный контейнер */
        .zovchat-container {
            max-width: 1400px;
            width: 100%;
            height: 90vh;
            background: #1e2a24;
            border-radius: 32px;
            display: flex;
            overflow: hidden;
            border: 2px solid #d4af37;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }

        /* Боковая панель с диалогами */
        .dialogs-panel {
            width: 320px;
            background: #16231c;
            border-right: 2px solid #2f4a38;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }

        .panel-header {
            padding: 20px 16px;
            background: #0f2a1c;
            border-bottom: 2px solid #d4af37;
            text-align: center;
        }

        .panel-header h1 {
            color: #ffde9c;
            font-size: 1.6rem;
            letter-spacing: 2px;
        }

        .panel-header p {
            color: #bdaa6e;
            font-size: 0.7rem;
            margin-top: 5px;
        }

        .user-card {
            padding: 12px 16px;
            background: #1a3327;
            margin: 12px;
            border-radius: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .user-name {
            color: #f5e7a3;
            font-weight: bold;
            font-size: 0.9rem;
        }

        .logout-btn {
            background: none;
            border: 1px solid #b8860b;
            color: #ffd966;
            padding: 4px 12px;
            border-radius: 40px;
            cursor: pointer;
            transition: 0.2s;
        }

        .logout-btn:hover {
            background: #b8860b;
            color: #1a3a2a;
        }

        .new-chat-button {
            margin: 12px;
            background: #d4af37;
            border: none;
            padding: 12px;
            border-radius: 40px;
            font-weight: bold;
            color: #1a3a2a;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .new-chat-button:hover {
            background: #f3cd6b;
            transform: scale(1.02);
        }

        .dialogs-list {
            flex: 1;
            padding: 8px;
        }

        .dialog-item {
            background: #25382e;
            margin-bottom: 8px;
            padding: 12px;
            border-radius: 20px;
            cursor: pointer;
            transition: 0.2s;
            border-left: 4px solid transparent;
        }

        .dialog-item:hover {
            background: #2f5e42;
            transform: translateX(4px);
        }

        .dialog-item.active {
            background: #2f5e42;
            border-left-color: #f3c26b;
        }

        .dialog-name {
            font-weight: bold;
            color: #ffefb9;
            font-size: 1rem;
        }

        .dialog-preview {
            font-size: 0.7rem;
            color: #baccb0;
            margin-top: 5px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* Область чата */
        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #1b2b23;
        }

        .chat-header {
            padding: 18px 24px;
            background: #12281d;
            border-bottom: 1px solid #d4af37;
        }

        .chat-title {
            font-size: 1.3rem;
            font-weight: bold;
            color: #ffdd99;
        }

        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            background: #202f26;
        }

        .message {
            max-width: 75%;
            padding: 10px 16px;
            border-radius: 22px;
            background: #2e4438;
            align-self: flex-start;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.my-message {
            align-self: flex-end;
            background: #1f6e46;
        }

        .message-sender {
            font-size: 0.7rem;
            color: #ffd966;
            margin-bottom: 4px;
        }

        .message-text {
            color: #f0f3e8;
            word-wrap: break-word;
            font-size: 0.95rem;
        }

        .message-time {
            font-size: 0.6rem;
            color: #9bbf8f;
            text-align: right;
            margin-top: 5px;
        }

        .input-area {
            padding: 16px 20px;
            background: #10261c;
            display: flex;
            gap: 12px;
            border-top: 1px solid #3f604a;
        }

        #messageInput {
            flex: 1;
            background: #2f4438;
            border: none;
            padding: 12px 20px;
            border-radius: 40px;
            color: white;
            outline: none;
            font-size: 1rem;
        }

        #messageInput:focus {
            border: 1px solid #d4af37;
        }

        .send-button {
            background: #d4af37;
            border: none;
            width: 48px;
            border-radius: 48px;
            font-weight: bold;
            cursor: pointer;
            font-size: 1.3rem;
            transition: 0.2s;
        }

        .send-button:hover {
            background: #f3cd6b;
            transform: scale(1.05);
        }

        /* Модальные окна */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
        }

        .modal-window {
            background: #1e3528;
            border-radius: 32px;
            padding: 32px;
            width: 90%;
            max-width: 400px;
            border: 1px solid #f3c26b;
        }

        .modal-window h2, .modal-window h3 {
            color: #ffde9c;
            margin-bottom: 16px;
            text-align: center;
        }

        .modal-window input {
            width: 100%;
            padding: 12px;
            margin: 15px 0;
            background: #2f4438;
            border: none;
            border-radius: 60px;
            color: white;
            font-size: 1rem;
        }

        .modal-buttons {
            display: flex;
            gap: 12px;
            margin-top: 15px;
        }

        .modal-buttons button {
            flex: 1;
            padding: 10px;
            border-radius: 40px;
            border: none;
            cursor: pointer;
            font-weight: bold;
        }

        .modal-buttons button:first-child {
            background: #d4af37;
        }

        .modal-buttons button:last-child {
            background: #4a4a4a;
            color: white;
        }

        .empty-state {
            text-align: center;
            color: #9bbf8f;
            margin-top: 40px;
        }

        .footer {
            font-size: 0.6rem;
            text-align: center;
            background: #0b1f16;
            color: #6a8f78;
            padding: 8px;
        }

        .error-message {
            background: #8b3a3a;
            color: #ffc9c9;
            padding: 10px;
            border-radius: 12px;
            margin: 10px;
            text-align: center;
            font-size: 0.8rem;
        }

        @media (max-width: 700px) {
            .dialogs-panel { width: 260px; }
            .message { max-width: 85%; }
        }
    </style>
</head>
<body>
<div id="app"></div>

<script>
    // 🔥 НОВЫЙ КОНФИГ FIREBASE (ваш)
    const firebaseConfig = {
        apiKey: "AIzaSyBXcr49_FsXs0orENB7DlG5hsc8XttrB-A",
        authDomain: "zovchat-cd042.firebaseapp.com",
        projectId: "zovchat-cd042",
        storageBucket: "zovchat-cd042.firebasestorage.app",
        messagingSenderId: "889640809628",
        appId: "1:889640809628:web:6f9f414a0f03dd1ed46959"
    };

    // Инициализация
    let app, db, auth;
    
    try {
        if (!firebase.apps.length) {
            app = firebase.initializeApp(firebaseConfig);
        }
        db = firebase.firestore(app);
        auth = firebase.auth(app);
        console.log("✅ ZOVchat: Firebase готов!");
    } catch(e) {
        console.error("❌ Ошибка:", e);
        document.getElementById('app').innerHTML = `<div class="modal-overlay"><div class="modal-window"><h2>⚠️ Ошибка</h2><p>${e.message}</p></div></div>`;
    }

    // Состояние
    let currentUser = null;
    let activeChatUserId = null;
    let dialogs = [];
    let unsubscribeMessages = null;
    let unsubscribeDialogs = null;
    const appContainer = document.getElementById('app');

    // Вспомогательные функции
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    function getChatId(uid1, uid2) {
        return uid1 < uid2 ? `${uid1}_${uid2}` : `${uid2}_${uid1}`;
    }

    function formatTime(date) {
        if (!date) return '';
        return `${date.getHours().toString().padStart(2,'0')}:${date.getMinutes().toString().padStart(2,'0')}`;
    }

    // Отправка сообщения
    async function sendMessage(receiverId, text) {
        if (!currentUser || !text.trim() || !receiverId) return;
        
        const chatId = getChatId(currentUser.uid, receiverId);
        const message = {
            fromId: currentUser.uid,
            fromName: currentUser.displayName || currentUser.email?.split('@')[0] || "Воин",
            toId: receiverId,
            text: text.trim(),
            timestamp: firebase.firestore.FieldValue.serverTimestamp(),
        };
        
        try {
            const chatRef = db.collection("chats").doc(chatId);
            await chatRef.set({
                participants: [currentUser.uid, receiverId],
                participantsNames: {
                    [currentUser.uid]: currentUser.displayName || "Воин",
                    [receiverId]: "загрузка..."
                },
                lastMessage: text.trim(),
                lastTimestamp: firebase.firestore.FieldValue.serverTimestamp()
            }, { merge: true });
            
            await chatRef.collection("messages").add(message);
            await chatRef.update({
                lastMessage: text.trim(),
                lastTimestamp: firebase.firestore.FieldValue.serverTimestamp()
            });
        } catch(e) { 
            console.error(e);
            alert("Не удалось отправить: " + e.message);
        }
    }

    // Подписка на сообщения
    function subscribeToMessages(otherUserId) {
        if (unsubscribeMessages) unsubscribeMessages();
        if (!currentUser || !otherUserId) return;
        
        const chatId = getChatId(currentUser.uid, otherUserId);
        const q = db.collection("chats").doc(chatId).collection("messages").orderBy("timestamp", "asc").limit(100);
        
        unsubscribeMessages = q.onSnapshot(snapshot => {
            const container = document.getElementById("messagesContainer");
            if (!container) return;
            
            if (snapshot.empty) {
                container.innerHTML = `<div class="empty-state">💬 Напишите первое сообщение</div>`;
                return;
            }
            
            let html = '';
            snapshot.forEach(doc => {
                const msg = doc.data();
                const isMine = msg.fromId === currentUser.uid;
                const sender = isMine ? "Я" : (msg.fromName || "Собеседник");
                let time = '';
                if (msg.timestamp) {
                    time = formatTime(msg.timestamp.toDate());
                }
                html += `
                    <div class="message ${isMine ? 'my-message' : ''}">
                        <div class="message-sender">${escapeHtml(sender)}</div>
                        <div class="message-text">${escapeHtml(msg.text)}</div>
                        <div class="message-time">${time}</div>
                    </div>
                `;
            });
            container.innerHTML = html;
            container.scrollTop = container.scrollHeight;
        });
    }

    // Подписка на список диалогов
    function subscribeToDialogs() {
        if (unsubscribeDialogs) unsubscribeDialogs();
        if (!currentUser) return;
        
        const q = db.collection("chats").where("participants", "array-contains", currentUser.uid);
        unsubscribeDialogs = q.onSnapshot(async (snapshot) => {
            const newDialogs = [];
            
            for (const docSnap of snapshot.docs) {
                const data = docSnap.data();
                const participants = data.participants || [];
                const otherId = participants.find(id => id !== currentUser.uid);
                if (!otherId) continue;
                
                let otherName = data.participantsNames?.[otherId] || "Товарищ";
                
                if (otherName === "загрузка...") {
                    try {
                        const userDoc = await db.collection("users").doc(otherId).get();
                        if (userDoc.exists) {
                            otherName = userDoc.data().displayName || "Боец";
                            await db.collection("chats").doc(docSnap.id).update({
                                [`participantsNames.${otherId}`]: otherName
                            });
                        }
                    } catch(e) {}
                }
                
                newDialogs.push({
                    userId: otherId,
                    userName: otherName,
                    lastMessage: data.lastMessage || "Нет сообщений",
                    lastTimestamp: data.lastTimestamp?.toDate() || new Date(0)
                });
            }
            
            newDialogs.sort((a, b) => b.lastTimestamp - a.lastTimestamp);
            dialogs = newDialogs;
            renderApp();
            
            if (activeChatUserId && !dialogs.some(d => d.userId === activeChatUserId)) {
                activeChatUserId = null;
                if (unsubscribeMessages) unsubscribeMessages();
                renderApp();
            }
        });
    }

    // Поиск и создание чата
    async function findOrCreateChat(searchQuery) {
        if (!currentUser) return;
        const query = searchQuery.trim();
        if (!query) return;
        
        try {
            let foundUser = null;
            
            // Поиск по email
            const emailQuery = await db.collection("users").where("email", "==", query).get();
            emailQuery.forEach(doc => {
                if (doc.id !== currentUser.uid) foundUser = { id: doc.id, ...doc.data() };
            });
            
            // Поиск по имени
            if (!foundUser) {
                const nameQuery = await db.collection("users").where("displayName", "==", query).get();
                nameQuery.forEach(doc => {
                    if (doc.id !== currentUser.uid) foundUser = { id: doc.id, ...doc.data() };
                });
            }
            
            if (!foundUser) {
                alert("❌ Пользователь не найден!");
                return;
            }
            
            const chatId = getChatId(currentUser.uid, foundUser.id);
            const chatRef = db.collection("chats").doc(chatId);
            const chatDoc = await chatRef.get();
            
            if (!chatDoc.exists) {
                await chatRef.set({
                    participants: [currentUser.uid, foundUser.id],
                    participantsNames: {
                        [currentUser.uid]: currentUser.displayName || "Воин",
                        [foundUser.id]: foundUser.displayName
                    },
                    lastMessage: "Чат создан",
                    lastTimestamp: firebase.firestore.FieldValue.serverTimestamp()
                });
            }
            
            activeChatUserId = foundUser.id;
            subscribeToMessages(activeChatUserId);
            renderApp();
        } catch(e) {
            alert("Ошибка: " + e.message);
        }
    }

    // Рендер основного интерфейса
    function renderApp() {
        if (!currentUser) return;
        
        const userName = currentUser.displayName || currentUser.email?.split('@')[0] || "Воин";
        
        // Боковая панель
        let sidebarHtml = `
            <div class="panel-header">
                <h1>⚡ ZOVchat ⚡</h1>
                <p>Своих не бросаем</p>
            </div>
            <div class="user-card">
                <span class="user-name">🔰 ${escapeHtml(userName)}</span>
                <button id="logoutBtn" class="logout-btn">Выйти</button>
            </div>
            <button id="newChatBtn" class="new-chat-button">➕ Новый диалог</button>
            <div class="dialogs-list">
        `;
        
        if (dialogs.length === 0) {
            sidebarHtml += `<div class="empty-state" style="padding:20px;">Нет диалогов<br>Начните новый!</div>`;
        } else {
            dialogs.forEach(dialog => {
                const activeClass = (activeChatUserId === dialog.userId) ? 'active' : '';
                const preview = dialog.lastMessage.length > 35 ? dialog.lastMessage.slice(0, 32) + '...' : dialog.lastMessage;
                sidebarHtml += `
                    <div class="dialog-item ${activeClass}" data-userid="${dialog.userId}">
                        <div class="dialog-name">🎖️ ${escapeHtml(dialog.userName)}</div>
                        <div class="dialog-preview">${escapeHtml(preview)}</div>
                    </div>
                `;
            });
        }
        sidebarHtml += `</div><div class="footer">🇷🇺 ZOV — За Отвагу и Верность</div>`;
        
        // Область чата
        let chatHtml = `
            <div class="chat-header">
                <div class="chat-title">
        `;
        
        if (activeChatUserId) {
            const activeDialog = dialogs.find(d => d.userId === activeChatUserId);
            chatHtml += `💬 Чат с ${escapeHtml(activeDialog?.userName || "Собеседником")}`;
        } else {
            chatHtml += `📭 Выберите диалог`;
        }
        
        chatHtml += `
                </div>
            </div>
            <div class="messages-area" id="messagesContainer">
        `;
        
        if (!activeChatUserId) {
            chatHtml += `<div class="empty-state">✨ Выберите чат или создайте новый ✨</div>`;
        }
        
        chatHtml += `
            </div>
            <div class="input-area">
                <input type="text" id="messageInput" placeholder="Сообщение..." autocomplete="off">
                <button id="sendBtn" class="send-button">➤</button>
            </div>
        `;
        
        appContainer.innerHTML = `<div class="zovchat-container"><div class="dialogs-panel">${sidebarHtml}</div><div class="chat-area">${chatHtml}</div></div>`;
        
        // Обработчики
        document.querySelectorAll('.dialog-item').forEach(el => {
            el.addEventListener('click', () => {
                const userId = el.getAttribute('data-userid');
                if (userId && userId !== activeChatUserId) {
                    activeChatUserId = userId;
                    subscribeToMessages(activeChatUserId);
                    renderApp();
                }
            });
        });
        
        document.getElementById('logoutBtn')?.addEventListener('click', () => auth.signOut());
        
        document.getElementById('newChatBtn')?.addEventListener('click', () => {
            const email = prompt("Введите email или позывной собеседника:");
            if (email) findOrCreateChat(email);
        });
        
        const sendBtn = document.getElementById('sendBtn');
        const msgInput = document.getElementById('messageInput');
        
        if (sendBtn && msgInput && activeChatUserId) {
            sendBtn.onclick = async () => {
                const text = msgInput.value.trim();
                if (text) {
                    await sendMessage(activeChatUserId, text);
                    msgInput.value = '';
                    msgInput.focus();
                }
            };
            msgInput.onkeypress = (e) => {
                if (e.key === 'Enter') sendBtn.click();
            };
        } else if (msgInput) {
            msgInput.disabled = !activeChatUserId;
            msgInput.placeholder = activeChatUserId ? "Сообщение..." : "Выберите чат";
        }
    }

    // Экран входа
    function renderLoginScreen() {
        appContainer.innerHTML = `
            <div class="modal-overlay">
                <div class="modal-window">
                    <h2>⚔️ ZOVchat ⚔️</h2>
                    <p style="color:#baccb0; text-align:center; margin-bottom:20px;">Мессенджер для своих</p>
                    <input type="text" id="nickname" placeholder="Позывной (как вас увидят)">
                    <input type="email" id="email" placeholder="Email">
                    <input type="password" id="password" placeholder="Пароль (мин 6 символов)">
                    <button id="authBtn" class="new-chat-button" style="width:100%; margin-top:16px;">ВОЙТИ / РЕГИСТРАЦИЯ</button>
                    <div id="errorMsg" style="color:#ffa76e; font-size:0.8rem; margin-top:16px; text-align:center;"></div>
                    <div style="margin-top:20px; font-size:0.7rem; color:#9bbf8f; text-align:center;">
                        ⭐ Если аккаунта нет — он создастся автоматически
                    </div>
                </div>
            </div>
        `;
        
        const authBtn = document.getElementById('authBtn');
        const nicknameInput = document.getElementById('nickname');
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        const errorSpan = document.getElementById('errorMsg');
        
        authBtn.onclick = async () => {
            const nickname = nicknameInput.value.trim() || "ZOVвоин";
            const email = emailInput.value.trim();
            const password = passwordInput.value.trim();
            
            if (!email || !password) {
                errorSpan.innerText = "❌ Заполните email и пароль";
                return;
            }
            if (password.length < 6) {
                errorSpan.innerText = "❌ Пароль минимум 6 символов";
                return;
            }
            
            errorSpan.innerText = "⏳ Подключение...";
            errorSpan.style.color = "#ffde9c";
            
            try {
                let userCred;
                try {
                    userCred = await auth.signInWithEmailAndPassword(email, password);
                } catch (err) {
                    if (err.code === 'auth/user-not-found') {
                        userCred = await auth.createUserWithEmailAndPassword(email, password);
                    } else {
                        throw err;
                    }
                }
                
                await userCred.user.updateProfile({ displayName: nickname });
                
                // Сохраняем данные пользователя
                await db.collection("users").doc(userCred.user.uid).set({
                    displayName: nickname,
                    email: email,
                    uid: userCred.user.uid
                }, { merge: true });
                
                console.log("✅ Добро пожаловать в ZOVchat!");
                
            } catch(err) {
                let msg = err.message;
                if (err.code === 'auth/invalid-email') msg = "Неверный email";
                if (err.code === 'auth/weak-password') msg = "Слабый пароль";
                if (err.code === 'auth/email-already-in-use') msg = "Email уже используется";
                errorSpan.style.color = "#ffa76e";
                errorSpan.innerText = "❌ " + msg;
            }
        };
        
        // Enter на любом поле
        [nicknameInput, emailInput, passwordInput].forEach(inp => {
            if (inp) inp.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') authBtn.click();
            });
        });
    }

    // Слушатель аутентификации
    if (auth) {
        auth.onAuthStateChanged(async (user) => {
            if (user) {
                currentUser = user;
                if (!user.displayName) {
                    const defaultName = user.email?.split('@')[0] || "ZOVвоин";
                    await user.updateProfile({ displayName: defaultName });
                    await db.collection("users").doc(user.uid).set({
                        displayName: defaultName,
                        email: user.email,
                        uid: user.uid
                    }, { merge: true });
                }
                subscribeToDialogs();
                if (activeChatUserId) subscribeToMessages(activeChatUserId);
            } else {
                if (unsubscribeMessages) unsubscribeMessages();
                if (unsubscribeDialogs) unsubscribeDialogs();
                currentUser = null;
                activeChatUserId = null;
                renderLoginScreen();
            }
        });
    }
</script>
</body>
</html>
