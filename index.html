<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZOVchat — Приватные чаты</title>
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Roboto', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0a1f14 0%, #0c2a1a 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
        }

        .private-chat-app {
            max-width: 1400px;
            width: 100%;
            height: 90vh;
            background: #1e2a24;
            border-radius: 32px;
            display: flex;
            overflow: hidden;
            border: 1px solid #d4af37;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }

        .dialogs-sidebar {
            width: 320px;
            background: #16231c;
            border-right: 2px solid #2f4a38;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }

        .sidebar-header {
            padding: 20px 16px;
            background: #0f2a1c;
            border-bottom: 2px solid #d4af37;
        }

        .sidebar-header h2 {
            color: #ffde9c;
            font-size: 1.4rem;
        }

        .user-info {
            padding: 12px 16px;
            background: #1a3327;
            margin: 8px 12px;
            border-radius: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .user-name-side {
            color: #f5e7a3;
            font-weight: bold;
        }

        .logout-side {
            background: none;
            border: 1px solid #b8860b;
            color: #ffd966;
            padding: 4px 12px;
            border-radius: 40px;
            cursor: pointer;
        }

        .new-chat-btn {
            margin: 16px;
            background: #d4af37;
            border: none;
            padding: 10px;
            border-radius: 40px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }

        .new-chat-btn:hover {
            background: #f3cd6b;
            transform: scale(1.02);
        }

        .dialogs-list {
            flex: 1;
            padding: 8px;
        }

        .dialog-item {
            background: #25382e;
            margin-bottom: 8px;
            padding: 12px;
            border-radius: 20px;
            cursor: pointer;
            transition: 0.2s;
            border-left: 4px solid transparent;
        }

        .dialog-item:hover {
            background: #2f5e42;
            transform: translateX(4px);
        }

        .dialog-item.active {
            background: #2f5e42;
            border-left-color: #f3c26b;
        }

        .dialog-name {
            font-weight: bold;
            color: #ffefb9;
            font-size: 1rem;
        }

        .dialog-preview {
            font-size: 0.75rem;
            color: #baccb0;
            margin-top: 5px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #1b2b23;
        }

        .chat-header-area {
            padding: 18px 24px;
            background: #12281d;
            border-bottom: 1px solid #d4af37;
        }

        .chat-with-name {
            font-size: 1.4rem;
            font-weight: bold;
            color: #ffdd99;
        }

        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: #202f26;
        }

        .message-bubble {
            max-width: 75%;
            padding: 10px 16px;
            border-radius: 22px;
            background: #2e4438;
            align-self: flex-start;
            margin-bottom: 12px;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message-bubble.my-message {
            align-self: flex-end;
            background: #1f6e46;
            margin-left: auto;
        }

        .msg-sender {
            font-size: 0.7rem;
            color: #ffd966;
            margin-bottom: 4px;
        }

        .msg-text {
            color: #f0f3e8;
            word-wrap: break-word;
        }

        .msg-time {
            font-size: 0.6rem;
            color: #9bbf8f;
            text-align: right;
            margin-top: 5px;
        }

        .input-wrapper {
            padding: 16px 20px;
            background: #10261c;
            display: flex;
            gap: 12px;
            border-top: 1px solid #3f604a;
        }

        #privateMessageInput {
            flex: 1;
            background: #2f4438;
            border: none;
            padding: 12px 20px;
            border-radius: 40px;
            color: white;
            outline: none;
            font-size: 1rem;
        }

        #privateMessageInput:focus {
            border: 1px solid #d4af37;
        }

        .send-private-btn {
            background: #d4af37;
            border: none;
            width: 48px;
            border-radius: 48px;
            font-weight: bold;
            cursor: pointer;
            font-size: 1.3rem;
            transition: 0.2s;
        }

        .send-private-btn:hover {
            background: #f3cd6b;
            transform: scale(1.05);
        }

        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
        }

        .modal-card {
            background: #1e3528;
            border-radius: 32px;
            padding: 32px;
            width: 90%;
            max-width: 400px;
            border: 1px solid #f3c26b;
        }

        .modal-card h2, .modal-card h3 {
            color: #ffde9c;
            margin-bottom: 16px;
        }

        .modal-card input {
            width: 100%;
            padding: 12px;
            margin: 15px 0;
            background: #2f4438;
            border: none;
            border-radius: 60px;
            color: white;
            font-size: 1rem;
        }

        .modal-buttons {
            display: flex;
            gap: 12px;
            margin-top: 15px;
        }

        .modal-buttons button {
            flex: 1;
            padding: 10px;
            border-radius: 40px;
            border: none;
            cursor: pointer;
            font-weight: bold;
        }

        .modal-buttons button:first-child {
            background: #d4af37;
        }

        .modal-buttons button:last-child {
            background: #4a4a4a;
            color: white;
        }

        .empty-chat {
            text-align: center;
            color: #9bbf8f;
            margin-top: 40px;
        }

        footer {
            font-size: 0.65rem;
            text-align: center;
            background: #0b1f16;
            color: #6a8f78;
            padding: 8px;
        }

        .loading {
            text-align: center;
            color: #ffde9c;
            padding: 20px;
        }

        @media (max-width: 700px) {
            .dialogs-sidebar { width: 260px; }
            .message-bubble { max-width: 85%; }
        }
    </style>
</head>
<body>
<div id="appRoot">
    <div class="loading">Загрузка ZOVchat...</div>
</div>

<script>
    // 🔥 ВАШ КОНФИГ FIREBASE (скопирован из консоли)
    const firebaseConfig = {
        apiKey: "AIzaSyBMO33F2WExKEEleIeDTV2TyYMizC9ssZY",
        authDomain: "zovchat-f1c83.firebaseapp.com",
        projectId: "zovchat-f1c83",
        storageBucket: "zovchat-f1c83.firebasestorage.app",
        messagingSenderId: "356416079878",
        appId: "1:356416079878:web:14a65405c2fd911bbb5b87"
    };

    // Инициализация Firebase
    let app, db, auth;
    
    try {
        if (!firebase.apps.length) {
            app = firebase.initializeApp(firebaseConfig);
        } else {
            app = firebase.app();
        }
        db = firebase.firestore(app);
        auth = firebase.auth(app);
        console.log("✅ Firebase инициализирован успешно!");
    } catch(e) {
        console.error("❌ Ошибка:", e);
        document.getElementById('appRoot').innerHTML = `
            <div class="modal">
                <div class="modal-card">
                    <h2>⚠️ Ошибка</h2>
                    <p>${e.message}</p>
                </div>
            </div>
        `;
    }

    // Глобальные переменные
    let currentUser = null;
    let activeDialogUserId = null;
    let dialogsList = [];
    let unsubscribeActiveChat = null;
    let dialogsUnsubscribe = null;
    const root = document.getElementById('appRoot');

    // Вспомогательные функции
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    function getChatId(uid1, uid2) {
        return uid1 < uid2 ? `${uid1}_${uid2}` : `${uid2}_${uid1}`;
    }

    // Отправка сообщения
    async function sendPrivateMessage(receiverId, text) {
        if (!currentUser || !text.trim() || !receiverId) return;
        
        const chatId = getChatId(currentUser.uid, receiverId);
        const messageObj = {
            fromId: currentUser.uid,
            fromName: currentUser.displayName || currentUser.email?.split('@')[0] || "Воин",
            toId: receiverId,
            text: text.trim(),
            timestamp: firebase.firestore.FieldValue.serverTimestamp(),
        };
        
        try {
            const chatRef = db.collection("private_chats").doc(chatId);
            
            // Создаем или обновляем чат
            await chatRef.set({
                participants: [currentUser.uid, receiverId],
                participantsNames: {
                    [currentUser.uid]: currentUser.displayName || "Воин",
                    [receiverId]: "загрузка..."
                },
                lastMessage: text.trim(),
                lastTimestamp: firebase.firestore.FieldValue.serverTimestamp()
            }, { merge: true });
            
            // Добавляем сообщение
            await chatRef.collection("messages").add(messageObj);
            
            // Обновляем последнее сообщение
            await chatRef.update({
                lastMessage: text.trim(),
                lastTimestamp: firebase.firestore.FieldValue.serverTimestamp()
            });
            
            return true;
        } catch(e) { 
            console.error("Ошибка отправки:", e);
            alert("Не удалось отправить сообщение: " + e.message);
            return false;
        }
    }

    // Подписка на сообщения в активном чате
    function subscribeToChatMessages(otherUserId) {
        if (unsubscribeActiveChat) unsubscribeActiveChat();
        if (!currentUser || !otherUserId) return;
        
        const chatId = getChatId(currentUser.uid, otherUserId);
        const messagesRef = db.collection("private_chats").doc(chatId).collection("messages");
        const q = messagesRef.orderBy("timestamp", "asc").limit(100);
        
        unsubscribeActiveChat = q.onSnapshot(snapshot => {
            const messagesDiv = document.getElementById("activeMessagesArea");
            if (!messagesDiv) return;
            
            if (snapshot.empty) {
                messagesDiv.innerHTML = `<div class="empty-chat">💬 Напишите первое сообщение товарищу</div>`;
                return;
            }
            
            let html = '';
            snapshot.forEach(doc => {
                const msg = doc.data();
                const isMine = msg.fromId === currentUser.uid;
                const senderName = isMine ? "Я" : (msg.fromName || "Собеседник");
                let timeStr = '';
                if (msg.timestamp) {
                    const date = msg.timestamp.toDate();
                    timeStr = `${date.getHours().toString().padStart(2,'0')}:${date.getMinutes().toString().padStart(2,'0')}`;
                }
                html += `
                    <div class="message-bubble ${isMine ? 'my-message' : ''}">
                        <div class="msg-sender">${escapeHtml(senderName)}</div>
                        <div class="msg-text">${escapeHtml(msg.text)}</div>
                        <div class="msg-time">${timeStr}</div>
                    </div>
                `;
            });
            messagesDiv.innerHTML = html;
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }, err => {
            console.warn("Ошибка загрузки сообщений:", err);
        });
    }

    // Подписка на список диалогов
    function subscribeToDialogs(userId) {
        if (dialogsUnsubscribe) dialogsUnsubscribe();
        if (!db) return;
        
        const q = db.collection("private_chats").where("participants", "array-contains", userId);
        dialogsUnsubscribe = q.onSnapshot(async (snapshot) => {
            const dialogs = [];
            
            for (const docSnap of snapshot.docs) {
                const data = docSnap.data();
                const participants = data.participants || [];
                const otherId = participants.find(id => id !== userId);
                if (!otherId) continue;
                
                let otherName = data.participantsNames ? data.participantsNames[otherId] : "Товарищ";
                
                // Если имя не загружено, пробуем получить из users_meta
                if (otherName === "загрузка..." || otherName === "Товарищ") {
                    try {
                        const userDoc = await db.collection("users_meta").doc(otherId).get();
                        if (userDoc.exists) {
                            otherName = userDoc.data().displayName || "Боец";
                            // Обновляем имя в чате
                            await db.collection("private_chats").doc(docSnap.id).update({
                                [`participantsNames.${otherId}`]: otherName
                            });
                        }
                    } catch(e) { console.warn(e); }
                }
                
                const lastMsg = data.lastMessage || "Нет сообщений";
                const lastTs = data.lastTimestamp ? data.lastTimestamp.toDate() : new Date(0);
                dialogs.push({
                    userId: otherId,
                    userName: otherName,
                    lastMessage: lastMsg,
                    lastTimestamp: lastTs,
                    chatDocId: docSnap.id
                });
            }
            
            dialogs.sort((a, b) => b.lastTimestamp - a.lastTimestamp);
            dialogsList = dialogs;
            renderMainApp();
            
            // Если активный диалог удален, сбрасываем
            if (activeDialogUserId && !dialogsList.some(d => d.userId === activeDialogUserId)) {
                activeDialogUserId = null;
                if (unsubscribeActiveChat) unsubscribeActiveChat();
                renderMainApp();
            }
        }, err => {
            console.error("Ошибка загрузки диалогов:", err);
            showTemporaryError("Ошибка загрузки диалогов. Проверьте интернет.");
        });
    }

    // Поиск и создание нового чата
    async function startNewChatWithUser(searchQuery) {
        if (!currentUser) return;
        const searchTerm = searchQuery.trim().toLowerCase();
        if (!searchTerm) return;
        
        try {
            // Ищем по email
            let emailQuery = await db.collection("users_meta").where("email", "==", searchTerm).get();
            let foundUser = null;
            
            emailQuery.forEach(doc => {
                if (doc.id !== currentUser.uid) foundUser = { id: doc.id, ...doc.data() };
            });
            
            // Если не нашли, ищем по имени
            if (!foundUser) {
                let nameQuery = await db.collection("users_meta").where("displayName", "==", searchTerm).get();
                nameQuery.forEach(doc => {
                    if (doc.id !== currentUser.uid) foundUser = { id: doc.id, ...doc.data() };
                });
            }
            
            if (!foundUser) {
                alert("❌ Пользователь не найден. Убедитесь, что он зарегистрирован в ZOVchat.");
                return;
            }
            
            const otherId = foundUser.id;
            const otherName = foundUser.displayName || "Товарищ";
            const chatId = getChatId(currentUser.uid, otherId);
            const chatDoc = await db.collection("private_chats").doc(chatId).get();
            
            if (!chatDoc.exists) {
                await db.collection("private_chats").doc(chatId).set({
                    participants: [currentUser.uid, otherId],
                    participantsNames: {
                        [currentUser.uid]: currentUser.displayName || "Воин",
                        [otherId]: otherName
                    },
                    lastMessage: "Чат создан",
                    lastTimestamp: firebase.firestore.FieldValue.serverTimestamp()
                });
            }
            
            activeDialogUserId = otherId;
            subscribeToChatMessages(otherId);
            renderMainApp();
        } catch(e) {
            console.error(e);
            alert("Ошибка: " + e.message);
        }
    }

    function showTemporaryError(msg) {
        const errorDiv = document.createElement('div');
        errorDiv.style.cssText = 'position:fixed; top:20px; left:50%; transform:translateX(-50%); background:#d32f2f; color:white; padding:12px 24px; border-radius:40px; z-index:10000;';
        errorDiv.textContent = msg;
        document.body.appendChild(errorDiv);
        setTimeout(() => errorDiv.remove(), 4000);
    }

    // Основной рендер
    function renderMainApp() {
        if (!currentUser) return;
        
        const userName = currentUser.displayName || currentUser.email?.split('@')[0] || "Воин";
        
        // Боковая панель
        let dialogsHtml = `
            <div class="sidebar-header">
                <h2>📡 ZOVchat</h2>
                <div style="font-size:0.7rem; color:#bdaa6e;">Приватные чаты</div>
            </div>
            <div class="user-info">
                <span class="user-name-side">🔰 ${escapeHtml(userName)}</span>
                <button id="globalLogoutBtn" class="logout-side">Выйти</button>
            </div>
            <button id="newChatBtn" class="new-chat-btn">➕ Новый диалог</button>
            <div class="dialogs-list">
        `;
        
        if (dialogsList.length === 0) {
            dialogsHtml += `<div style="color:#b0b79a; text-align:center; padding:20px;">Нет диалогов. Начните новый!</div>`;
        } else {
            dialogsList.forEach(dialog => {
                const activeClass = (activeDialogUserId === dialog.userId) ? 'active' : '';
                const preview = dialog.lastMessage.length > 35 ? dialog.lastMessage.slice(0, 32) + '...' : dialog.lastMessage;
                dialogsHtml += `
                    <div class="dialog-item ${activeClass}" data-otherid="${dialog.userId}">
                        <div class="dialog-name">⚡ ${escapeHtml(dialog.userName)}</div>
                        <div class="dialog-preview">${escapeHtml(preview)}</div>
                    </div>
                `;
            });
        }
        dialogsHtml += `</div><footer>🇷🇺 Своих не бросаем — приватно и надёжно</footer>`;
        
        // Область чата
        let chatAreaHtml = `
            <div class="chat-header-area">
                <div class="chat-with-name">
        `;
        if (activeDialogUserId) {
            const activeDialog = dialogsList.find(d => d.userId === activeDialogUserId);
            const displayNameActive = activeDialog ? activeDialog.userName : "Собеседник";
            chatAreaHtml += `💬 Чат с ${escapeHtml(displayNameActive)}`;
        } else {
            chatAreaHtml += `📭 Выберите диалог или создайте новый`;
        }
        chatAreaHtml += `
                </div>
            </div>
            <div class="messages-container" id="activeMessagesArea">
        `;
        if (!activeDialogUserId) {
            chatAreaHtml += `<div class="empty-chat">✨ Нажмите на диалог или создайте новый чат ✨</div>`;
        }
        chatAreaHtml += `
            </div>
            <div class="input-wrapper">
                <input type="text" id="privateMessageInput" placeholder="Сообщение..." autocomplete="off">
                <button id="sendPrivateMsgBtn" class="send-private-btn">➤</button>
            </div>
        `;
        
        root.innerHTML = `<div class="private-chat-app"><div class="dialogs-sidebar">${dialogsHtml}</div><div class="chat-area">${chatAreaHtml}</div></div>`;
        
        // Обработчики событий
        document.querySelectorAll('.dialog-item').forEach(el => {
            el.addEventListener('click', () => {
                const otherId = el.getAttribute('data-otherid');
                if (otherId && otherId !== activeDialogUserId) {
                    activeDialogUserId = otherId;
                    subscribeToChatMessages(otherId);
                    renderMainApp();
                }
            });
        });
        
        const logoutBtn = document.getElementById('globalLogoutBtn');
        if (logoutBtn) logoutBtn.onclick = () => auth.signOut();
        
        const newChatBtn = document.getElementById('newChatBtn');
        if (newChatBtn) {
            newChatBtn.onclick = () => {
                const email = prompt("Введите email или позывной собеседника:");
                if (email && email.trim()) startNewChatWithUser(email);
            };
        }
        
        const sendBtn = document.getElementById('sendPrivateMsgBtn');
        const msgInput = document.getElementById('privateMessageInput');
        if (sendBtn && msgInput && activeDialogUserId) {
            sendBtn.onclick = async () => {
                const text = msgInput.value.trim();
                if (text) {
                    await sendPrivateMessage(activeDialogUserId, text);
                    msgInput.value = '';
                    msgInput.focus();
                }
            };
            msgInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') sendBtn.click();
            });
        } else if (msgInput) {
            msgInput.disabled = !activeDialogUserId;
            msgInput.placeholder = activeDialogUserId ? "Сообщение..." : "Выберите чат для отправки сообщений";
        }
    }

    // Экран входа/регистрации
    function renderLoginScreen() {
        root.innerHTML = `
            <div class="modal">
                <div class="modal-card">
                    <h2>⚔️ ZOVchat ⚔️</h2>
                    <p style="color:#baccb0; margin-bottom:20px;">Приватные чаты для своих</p>
                    <input type="text" id="regNickname" placeholder="Позывной (как вас будут видеть)">
                    <input type="email" id="regEmail" placeholder="Email">
                    <input type="password" id="regPassword" placeholder="Пароль (минимум 6 символов)">
                    <button id="authActionBtn" class="new-chat-btn" style="width:100%; margin-top:16px;">ВОЙТИ / ЗАРЕГИСТРИРОВАТЬСЯ</button>
                    <div id="loginErrorMessage" style="color:#ffa76e; font-size:0.8rem; margin-top:16px; text-align:center;"></div>
                    <div style="margin-top:20px; font-size:0.7rem; color:#9bbf8f; text-align:center;">
                        ⭐ Если аккаунта нет — он будет создан автоматически
                    </div>
                </div>
            </div>
        `;
        
        const authBtn = document.getElementById('authActionBtn');
        const nicknameInp = document.getElementById('regNickname');
        const emailInp = document.getElementById('regEmail');
        const passInp = document.getElementById('regPassword');
        const errorSpan = document.getElementById('loginErrorMessage');
        
        authBtn.onclick = async () => {
            const nickname = nicknameInp.value.trim() || "ВоинZOV";
            const email = emailInp.value.trim();
            const password = passInp.value.trim();
            
            if (!email || !password) {
                errorSpan.innerText = "❌ Заполните email и пароль";
                return;
            }
            if (password.length < 6) {
                errorSpan.innerText = "❌ Пароль должен быть не менее 6 символов";
                return;
            }
            
            errorSpan.innerText = "⏳ Подключение...";
            
            try {
                let userCred;
                try {
                    userCred = await auth.signInWithEmailAndPassword(email, password);
                } catch (err) {
                    if (err.code === 'auth/user-not-found') {
                        userCred = await auth.createUserWithEmailAndPassword(email, password);
                    } else {
                        throw err;
                    }
                }
                
                const user = userCred.user;
                await user.updateProfile({ displayName: nickname });
                await user.reload();
                
                // Сохраняем метаданные пользователя для поиска
                await db.collection("users_meta").doc(user.uid).set({
                    displayName: nickname,
                    email: email,
                    uid: user.uid
                }, { merge: true });
                
                console.log("✅ Успешный вход/регистрация!");
                
            } catch(err) {
                console.error("Ошибка:", err);
                let errorMessage = err.message;
                if (err.code === 'auth/invalid-email') errorMessage = "Неверный формат email";
                if (err.code === 'auth/weak-password') errorMessage = "Слишком слабый пароль (мин 6 символов)";
                if (err.code === 'auth/email-already-in-use') errorMessage = "Email уже используется, попробуйте войти";
                errorSpan.innerText = "❌ " + errorMessage;
            }
        };
        
        // Enter key support
        const inputs = [nicknameInp, emailInp, passInp];
        inputs.forEach(inp => {
            if (inp) inp.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') authBtn.click();
            });
        });
    }

    // Слушатель состояния аутентификации
    if (auth) {
        auth.onAuthStateChanged(async (user) => {
            if (user) {
                currentUser = user;
                if (!user.displayName) {
                    const defaultName = user.email?.split('@')[0] || "Воин";
                    await user.updateProfile({ displayName: defaultName });
                    await db.collection("users_meta").doc(user.uid).set({
                        displayName: defaultName,
                        email: user.email,
                        uid: user.uid
                    }, { merge: true });
                }
                subscribeToDialogs(user.uid);
                if (activeDialogUserId) subscribeToChatMessages(activeDialogUserId);
            } else {
                if (unsubscribeActiveChat) unsubscribeActiveChat();
                if (dialogsUnsubscribe) dialogsUnsubscribe();
                currentUser = null;
                activeDialogUserId = null;
                renderLoginScreen();
            }
        });
    }
</script>
</body>
</html>
